<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopeMind - Dashboard de Matches</title>
    <link rel="stylesheet" href="../css/global.css">
    <style>
        .header-wrapper {
            text-align: center;
            margin: 4rem 0 3rem;
        }
        .match-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2.5rem 1.5rem;
            position: relative;
            overflow: hidden;
        }
        .match-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1.5rem;
            border: 4px solid var(--color-primary-light);
        }
        .badge-match {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background-color: var(--color-primary-light);
            color: var(--color-accent-1);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .doc-name {
            font-size: 1.3rem;
            color: var(--color-text-main);
            margin-bottom: 0.3rem;
        }
        .doc-spec {
            color: var(--color-text-muted);
            font-size: 1rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .doc-crp {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 2rem;
        }
        .btn-whatsapp {
            background-color: #25D366; 
            color: white;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-whatsapp:hover {
            background-color: #128C7E;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
        .btn-profile {
            background-color: transparent;
            color: var(--color-accent-1);
            border: 2px solid var(--color-primary-light);
            margin-top: 0.8rem;
            width: 100%;
        }
        .btn-profile:hover {
            background-color: var(--color-primary-light);
            transform: none;
            box-shadow: none;
        }
    </style>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0d6efd">

</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
            <div class="sidebar-profile">
                <img src="../assets/images/logo.png" alt="User Profile" id="sidebar-user-photo" onerror="this.src='https://via.placeholder.com/80/A3E4D7/333333?text=User'">
                <h3 id="sidebar-user-name">Carregando...</h3>
                <a href="/views/perfil.html" id="btn-perfil" class="btn-perfil-sm">Perfil</a>
            </div>
            <nav class="sidebar-nav">
                <a href="/views/home.html">🏠 <span class="nav-text">Início</span></a>
                <a href="/views/dashboard-paciente.html" class="active">🤝 <span class="nav-text">Matches</span></a>
                <a href="/views/meus-psicologos.html" id="nav-meus-psicologos">👤 <span class="nav-text">Meus Psicólogos</span></a>
                <a href="/views/calendario.html">📅 <span class="nav-text">Calendário</span></a>
                <a href="/views/ajustes.html">⚙️ <span class="nav-text">Ajustes</span></a>
                <a href="#" id="btn-logout" style="margin-top: auto; color: #E74C3C;">🚪 <span class="nav-text">Sair</span></a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="container">
                <div class="header-wrapper">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Seus Matches 🤝</h1>
            <p style="color: var(--color-text-muted); font-size: 1.1rem;">Com base no seu perfil, calculamos a afinidade com a nossa rede de psicólogos.</p>
        </div>
        
        <div id="error-message" class="hidden" style="color: var(--color-error); background: #fdeaea; padding: 1rem; text-align: center; border-radius: 8px; margin-bottom: 2rem;"></div>

        <div class="grid-auto" id="matches-grid">
            <div style="text-align: center; grid-column: 1 / -1; padding: 3rem; color: var(--color-text-muted);">
                Buscando os melhores especialistas para você...
            </div>
        </div>
    </div>
        </main>
    </div>

    <script type="module" src="../js/dashboard.js"></script>

    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('Service Worker registrado!', reg))
            .catch(err => console.error('Erro no Service Worker:', err));
        });
      }
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userDataStr = localStorage.getItem('hopemind_user');
            if (userDataStr) {
                const user = JSON.parse(userDataStr);
                document.getElementById('sidebar-user-name').textContent = user.nome.split(' ')[0];

            }
            document.getElementById('btn-logout').addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('hopemind_user');
                localStorage.removeItem('hopemind_token');
                window.location.href = '/views/login.html';
            });
        });
    </script>

    <script>
        if (localStorage.getItem('sidebar_collapsed') === 'true') {
            document.body.classList.add('sidebar-collapsed');
        }
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('sidebar-toggle');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    document.body.classList.toggle('sidebar-collapsed');
                    localStorage.setItem('sidebar_collapsed', document.body.classList.contains('sidebar-collapsed'));
                });
            }
        });
    </script>

</body>
</html>
