version: '3.8'

services:
  db:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: ""
      MARIADB_DATABASE: hopemind
      MARIADB_USER: dev_hope
      MARIADB_PASSWORD: projetofn
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=dev_hope
      - DB_PASSWORD=projetofn
      - DB_NAME=hopemind
      - JWT_SECRET=super_secret_hopemind_key_2026
    depends_on:
      - db

  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

volumes:
  mariadb_data:
