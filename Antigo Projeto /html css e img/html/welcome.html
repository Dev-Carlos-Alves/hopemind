<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hopemind - Welcome</title>
    <link rel="stylesheet" href="css/styles-welcome.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="welcome-screen">

    <div class="app-container">
        <header class="welcome-header">
            <div class="status-bar-container">
                <img src="img/status-icons.png" alt="Hora, Sinal de Wi-Fi e Bateria" class="status-icons-full">
            </div>

            <div class="welcome-content">
                <div class="welcome-text">
                    <span class="greeting">Olá,</span>
                    <h1 class="user-name">Maria !</h1>
                </div>
                <div class="user-avatar-container">
                    <img src="img/perfil-usuario.png" alt="Avatar do usuário" class="user-avatar">
                </div>
            </div>
        </header>

        <main class="welcome-content-wrapper">
            
            <section class="search-bar-section">
                <div class="search-input-wrapper">
                    <img src="img/lupa.png" alt="Ícone de busca" class="search-icon">
                    <input type="text" placeholder="Procure um Profissional" class="search-input">
                    <img src="img/filtros.png" alt="Ícone de filtros" class="filter-icon">
                </div>
            </section>

            <section class="professional-categories">
                <nav class="categories-nav">
                    <a href="#" class="category-item active">Psicólogos</a>
                    <a href="#" class="category-item">Terapeutas</a>
                    <a href="#" class="category-item">Psiquiatras</a>
                </nav>
            </section>

			<section class="professional-cards-section">
                <div class="professional-cards-container">
                    <article class="professional-card">
                        <div class="professional-image-wrapper">
                            <img src="img/rafael-welcome.png" alt="Foto do Dr. Rafael Moura" class="professional-photo">
                        </div>
                        <div class="professional-details">
                            <h3 class="professional-name">Rafael Moura</h3>
                            <p class="professional-title">Psicólogo TCC</p>
                            <div class="rating-and-link">
                                <div class="rating">
                                    <span class="star-icon material-icons">star</span>
                                    <span class="star-icon material-icons">star</span>
                                    <span class="star-icon material-icons">star</span>
                                    <span class="star-icon material-icons">star</span>
                                    <span class="star-icon material-icons">star_half</span>
                                </div>
                                <a  href="doctor-profile.html" class="profile-link" aria-label="Ver perfil de Rafael Moura">
                                    <img src="img/avancar.png" alt="Seta para avançar" class="arrow-icon">
                                </a>
                            </div>
                        </div>
                    </article>

                    <article class="professional-card">
                        <div class="professional-image-wrapper">
                            <img src="img/roberto-welcome.png" alt="Foto do Dr. Roberto Silva" class="professional-photo">
                        </div>
                        <div class="professional-details">
                            <h3 class="professional-name">Roberto Silva</h3>
                            <p class="professional-title">Psicólogo Psicanalista</p>
                            <div class="rating-and-link">
                                <div class="rating">
                                    <span class="star-icon material-icons">star</span>
                                    <span class="star-icon material-icons">star</span>
                                    <span class="star-icon material-icons">star</span>
                                    <span class="star-icon material-icons">star</span>
                                    <span class="star-icon material-icons">star_half</span>
                                </div>
                                </div>
                        </div>
                    </article>
                </div>
            </section>

            <section class="how-are-you-feeling">
                <h2>COMO ESTÁ SE SENTINDO HOJE ?</h2>
                <img src="img/sentimentos.png" alt="Opções de como você está se sentindo hoje" class="feelings-full-image">
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active" aria-label="Início">
                <span class="material-icons">home</span>
            </a>
            <a href="#" class="nav-item" aria-label="Notificações">
                <span class="material-icons">notifications</span>
            </a>
            <a href="#" class="nav-item" aria-label="Perfil">
                <span class="material-icons">person</span>
            </a>
        </nav>
    </div> 
	</body>
</html>
