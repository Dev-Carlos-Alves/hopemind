<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hopemind - Splash 2</title>
    <link rel="stylesheet" href="css/styles-splash2.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto&display=swap" rel="stylesheet">
</head>
<body class="splash-screen">

    <div class="app-container">
        <header class="status-bar">
            <img src="img/status-icons.png" alt="Hora, Sinal de Wifi e Bateria" class="status-icons-full"> 
        </header>

        <div class="splash-top-decoration">
            <div class="circle-large"></div>
            <div class="circle-small"></div>
        </div>

        <main class="splash-content-wrapper">
            <section class="splash-illustration-section">
                <img src="img/illustration-splash2.png" alt="Ilustração sobre apoio" class="illustration-splash2">
            </section>

            <section class="splash-text-content">
                <h1 class="splash-title">Juntos somos mais fortes</h1>
                <p class="splash-subtitle">Conecte-se com especialistas do conforto de sua casa via video-chamadas, ligações de aúdio ou mensagens em tempo real.</p>
            </section>
            
            <div class="pagination-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>

            <div class="splash-action">
                <a href="splash3.html" class="btn-primary-splash">PRÓXIMO</a>
            </div>
        </main>
    </div>

</body>
</html>
