<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hopemind - Cadastro</title>
    <link rel="stylesheet" href="css/styles-registration.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto&display=swap" rel="stylesheet">
</head>
<body class="registration-screen">

    <div class="app-container">
        <header class="status-bar">
            <img src="img/status-icons.png" alt="Hora, Sinal de Wifi e Bateria" class="status-icons-full"> 
        </header>

        <div class="splash-top-decoration">
            <div class="circle-large"></div>
            <div class="circle-small"></div>
        </div>

        <main class="registration-content-wrapper"> <img src="img/logo-hopemind-full.png" alt="Logo Hopemind" class="registration-logo"> <h1 class="registration-title">Criar conta</h1> <p class="registration-subtitle">Preencha os campos para se cadastrar.</p> <form action="#" method="post" class="registration-form">
                <div class="form-group">
                    <label for="name" class="form-label">Nome</label>
                    <input type="text" id="name" name="name" placeholder="Digite seu nome completo" required class="form-input">
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required class="form-input">
                </div>
                
                <div class="form-group">
                    <label for="cpf" class="form-label">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF" required class="form-input mask-cpf"> </div>
                
                <div class="form-group">
                    <label for="sus" class="form-label">Cartão SUS</label> <input type="text" id="sus" name="sus" placeholder="Digite o número do seu Cartão SUS" required class="form-input mask-sus"> </div>

                <div class="form-group">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Crie uma senha" required class="form-input">
                </div>
                
                <div class="form-group">
                    <label for="confirm-password" class="form-label">Confirmar Senha</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Repita a senha" required class="form-input">
                </div>

                <button type="submit" class="btn-primary-splash btn-register-action">CADASTRAR</button> </form>

            <div class="back-to-login-link"> <a href="login.html" class="link-back">← Voltar para Login</a>
            </div>
        </main>

</body>
</html>
