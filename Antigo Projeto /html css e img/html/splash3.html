<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hopemind - Splash 3</title>
    <link rel="stylesheet" href="css/styles-splash3.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto&display=swap" rel="stylesheet">
</head>
<body class="splash-screen">

    <div class="app-container">
        <header class="status-bar">
            <img src="img/status-icons.png" alt="Hora, Sinal de Wifi e Bateria" class="status-icons-full"> 
        </header>

        <div class="splash-top-decoration">
            <div class="circle-large"></div>
            <div class="circle-small"></div>
        </div>

        <main class="splash-content-wrapper">
            <section class="splash-illustration-section">
                <img src="img/illustration-splash3.png" alt="Ilustração sobre escolha de profissional" class="illustration-splash3">
            </section>

            <section class="splash-text-content">
                <h1 class="splash-title">ESCOLHA O MELHOR PROFISSIONAL PARA VOCÊ!</h1>
                <p class="splash-subtitle">Conte o auxílio da nossa IA especializada para encontrar o seu profissional Ideal.</p>
            </section>
            
            <div class="pagination-dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot active"></span> </div>

            <div class="splash-action">
                <a href="login.html" class="btn-primary-splash">ENTRAR</a>
            </div>

            <div class="professional-link-section">
                <p>Você é um profissional?</p>
                <a href="registration.html" class="link-professional">Entre aqui!</a>
            </div>
        </main>
    </div>

</body>
</html>
